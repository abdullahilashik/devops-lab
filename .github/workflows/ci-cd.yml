name: Github CI CD

on:
  push:
    branches: [master]
    paths:
      - "app/nestjs-devops/**" # only trigger if nestjs is updated
      - ".github/workflows/*"
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app/nestjs-devops
    strategy:
      matrix:
        os: [ubuntu-latest] # ubuntu-latest, windows-latest, macOS-latest
        node: [20] # 18, 19, 20

    steps:
      # Check out names
      - name: Check the repository
        uses: actions/checkout@v4

      # Install nodejs
      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20              

      # Install dependencies
      - name: Install dependencies
        run: npm i --force
                

      # Run tests
      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-image

    if: github.ref == 'refs/heads/master'   # only deploy from the master branch

    steps:
      - name: Deploy to production
        run: |
          echo "Dploying to production EC2"


  build-image: # <--- NEW JOB
    needs: build-and-test # Only build image if tests pass
    runs-on: ubuntu-latest
    permissions: # Required to push to GHCR
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Provided automatically by GitHub

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: app/nestjs-devops # Point to your sub-directory
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }} # Tag with commit hash for easy rollback