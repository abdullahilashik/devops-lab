name: Github CI CD

on:
  push:
    branches: [master]
    paths:
      - "app/nestjs-devops/**" # only trigger if nestjs is updated
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app/nestjs-devops
    strategy:
      matrix:
        os: [ubuntu-latest] # ubuntu-latest, windows-latest, macOS-latest
        node: [20] # 18, 19, 20

    steps:
      # Check out names
      - name: Check the repository
        uses: actions/checkout@v4

      # Install nodejs
      - name: Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20              

      # Install dependencies
      - name: Install dependencies
        run: npm i --force
                

      # Run tests
      - name: Run tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test 

    if: github.ref == 'refs/heads/master'   # only deploy from the master branch

    steps:
      - name: Deploy to production
        run: |
          echo "Dploying to production EC2"