name: Github CI CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Check out names
      - name: 🤖 Check the repository
        uses: actions/checkout@v4

      # Install nodejs
      - name: ⚙️ Setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: [18, 20]